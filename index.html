<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 雙廂自排商用車規格對照</title>

<style>
:root {
    --primary: #2f3e8f;
    --primary-light: #eef2ff;
    --accent: #e53935;
    --bg: #f5f7fb;
}

body {
    font-family: 'Microsoft JhengHei', sans-serif;
    margin: 0;
    background: var(--bg);
    color: #333;
}

header {
    background: linear-gradient(135deg, var(--primary), #4c5bd4);
    color: white;
    padding: 30px 20px;
    text-align: center;
}

.container {
    max-width: 1000px;
    margin: 30px auto;
    padding: 10px;
}

.table-wrapper {
    background: white;
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: var(--primary);
    color: white;
    padding: 14px;
}

td {
    padding: 14px;
    border-bottom: 1px solid #eee;
    text-align: center;
}

.row-label {
    background: var(--primary-light);
    font-weight: 600;
    color: var(--primary);
    text-align: left;
    width: 150px;
}

.highlight-red {
    color: var(--accent);
    font-weight: bold;
}

.highlight-blue {
    color: #1976d2;
    font-weight: bold;
}

.note {
    margin-top: 10px;
    font-size: 13px;
    color: #666;
    text-align: right;
}
</style>
</head>

<body>

<header>
    <h1>2026年 雙廂自排商用車規格對照表</h1>
</header>

<div class="container">
<div class="table-wrapper">
<table>
<thead>
<tr>
<th class="row-label">品牌車款</th>
<th>Hyundai Porter II</th>
<th>Kia 卡旺 K2500</th>
<th>Mitsubishi 得利卡</th>
</tr>
</thead>
<tbody>
<tr>
<td class="row-label">引擎燃料</td>
<td>柴油渦輪</td>
<td>柴油渦輪</td>
<td class="highlight-blue">汽油</td>
</tr>
<tr>
<td class="row-label">座位數</td>
<td>6人</td>
<td>6人</td>
<td>6人</td>
</tr>
<tr>
<td class="row-label">自排型式</td>
<td>5速手自排</td>
<td>5速手自排 (僅2WD)</td>
<td>5速自排</td>
</tr>
<tr>
<td class="row-label">驅動方式</td>
<td>後輪驅動 (2WD)</td>
<td>2WD / 4WD (<span class="highlight-red">4WD無自排</span>)</td>
<td>後輪驅動 (2WD)</td>
</tr>
<tr>
<td class="row-label">最大扭力</td>
<td>26.5 kgm</td>
<td>26.5 kgm</td>
<td>19.4 kgm</td>
</tr>
<tr>
<td class="row-label">特色評比</td>
<td>最舒適、配備佳</td>
<td>有4WD手排可選</td>
<td><span class="highlight-blue">保養最省、維修零件極多</span></td>
</tr>
</tbody>
</table>

<div class="note">
※ 中華得利卡雖然也有 4WD 版本，但目前台灣市售的雙廂 4WD 亦是以手排為主。
</div>

</div>
</div>

</body>
</html>
