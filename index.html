<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 雙廂商用車規格對照表 (修正版)</title>

<style>
:root {
    --primary: #2f3e8f;
    --primary-light: #eef2ff;
    --accent: #e53935;
    --bg: #f5f7fb;
}

body {
    font-family: 'Microsoft JhengHei', sans-serif;
    margin: 0;
    background: var(--bg);
    color: #333;
}

header {
    background: linear-gradient(135deg, var(--primary), #4c5bd4);
    color: white;
    padding: 40px 20px;
    text-align: center;
}

.container {
    max-width: 900px;
    margin: 30px auto;
    padding: 10px;
}

.car-grid {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 30px;
}

.car-card {
    background: white;
    width: 300px;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.car-title {
    text-align: center;
    padding: 12px;
    font-weight: bold;
    color: var(--primary);
}

.table-wrapper {
    background: white;
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: var(--primary);
    color: white;
    padding: 14px;
}

td {
    padding: 14px;
    border-bottom: 1px solid #eee;
    text-align: center;
}

.row-label {
    background: var(--primary-light);
    font-weight: 600;
    color: var(--primary);
    text-align: left;
}

.highlight-red {
    color: var(--accent);
    font-weight: bold;
}

.note {
    margin-top: 10px;
    font-size: 13px;
    color: #666;
    text-align: right;
}
</style>
</head>

<body>

<header>
    <h1>2026年 雙廂商用車規格對照 (修正版)</h1>
</header>

<div class="container">

<div class="car-grid">
    <div class="car-card">
        <div class="car-title">Hyundai Porter II (小霸王)</div>
    </div>
    <div class="car-card">
        <div class="car-title">Kia 卡旺 K2500</div>
    </div>
</div>

<div class="table-wrapper">
<table>
<thead>
<tr>
<th class="row-label">品牌車款</th>
<th>Hyundai Porter II</th>
<th>Kia 卡旺 K2500</th>
</tr>
</thead>
<tbody>
<tr>
<td class="row-label">座位數</td>
<td>6人</td>
<td>6人</td>
</tr>
<tr>
<td class="row-label">驅動方式</td>
<td>後輪驅動 (2WD)</td>
<td>2WD / 4WD</td>
</tr>
<tr>
<td class="row-label">變速系統</td>
<td>6速手排 / 5速手自排</td>
<td>
    2WD: 手排 / 手自排<br>
    <span class="highlight-red">4WD: 僅限手排</span>
</td>
</tr>
<tr>
<td class="row-label">手自排可行性</td>
<td class="highlight-red">可選擇</td>
<td>
    2WD: <span class="highlight-red">可選擇</span><br>
    4WD: 無自排選項
</td>
</tr>
<tr>
<td class="row-label">貨斗長度(mm)</td>
<td>2,185</td>
<td>2,185</td>
</tr>
</tbody>
</table>

<div class="note">
※ 註：卡旺 4WD 版本因機械結構與定位，目前全數僅提供手排設定。
</div>

</div>
</div>

</body>
</html>
