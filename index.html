<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貨車選車工具</title>

<style>
body {
    font-family: 'Microsoft JhengHei', sans-serif;
    background: #f5f7fb;
    margin: 0;
}

header {
    background: #2f3e8f;
    color: white;
    text-align: center;
    padding: 30px;
}

.container {
    max-width: 900px;
    margin: 30px auto;
    padding: 20px;
}

.box {
    background: white;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
}

button {
    background: #2f3e8f;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
}

.result {
    margin-top: 20px;
}

.car {
    border-bottom: 1px solid #eee;
    padding: 10px 0;
}
</style>
</head>

<body>

<header>
<h1>🚗 貨車選車工具（雙廂）</h1>
</header>

<div class="container">

<div class="box">
<h3>選擇條件</h3>

<label>
<input type="checkbox" id="auto"> 必須自排
</label><br><br>

<label>
<input type="checkbox" id="awd"> 需要四輪驅動
</label><br><br>

<label>
最低載重：
<select id="load">
<option value="0">不限</option>
<option value="1000">1000kg</option>
<option value="1300">1300kg</option>
<option value="1500">1500kg</option>
</select>
</label><br><br>

<button onclick="filterCars()">開始篩選</button>

</div>

<div class="box result" id="result">
請選擇條件後點擊篩選
</div>

</div>

<script>

const cars = [
{
name: "DFSK 大穩發",
auto: false,
awd: false,
load: 1300,
desc: "價格最便宜，但無自排"
},
{
name: "Hyundai Porter II",
auto: true,
awd: false,
load: 1575,
desc: "最穩定首選，自排成熟"
},
{
name: "Kia K2500（2WD）",
auto: true,
awd: false,
load: 1400,
desc: "有自排但僅限2WD"
},
{
name: "Kia K2500（4WD）",
auto: false,
awd: true,
load: 1400,
desc: "有四驅但無自排"
}
];

function filterCars() {

let needAuto = document.getElementById("auto").checked;
let needAwd = document.getElementById("awd").checked;
let minLoad = parseInt(document.getElementById("load").value);

let result = cars.filter(car => {

if (needAuto && !car.auto) return false;
if (needAwd && !car.awd) return false;
if (car.load < minLoad) return false;

return true;

});

let html = "";

if (result.length === 0) {
html = "<p>❌ 沒有符合條件的車款</p>";
} else {
result.forEach(car => {
html += `
<div class="car">
<strong>${car.name}</strong><br>
載重：約 ${car.load} kg<br>
${car.desc}
</div>
`;
});
}

document.getElementById("result").innerHTML = html;

}

</script>

</body>
</html>
